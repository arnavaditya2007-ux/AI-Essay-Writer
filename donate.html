<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support EssayAI - Keep it running</title>
    <meta name="description" content="Support EssayAI to help keep our free, high-quality, and undetectable AI essay writing tools active and running.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific header alignment override for Donate page */
        .donate-header-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 24px;
        }
        
        .btn-back {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .btn-back:hover {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }
        
        .btn-back i {
            width: 18px;
            height: 18px;
        }

        .donate-card-full {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .donate-title-area {
            text-align: center;
            margin-bottom: 8px;
        }

        .donate-title-area h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .donate-title-area p {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <header class="app-header">
            <div class="donate-header-nav">
                <a href="index.html" class="btn-back">
                    <i data-lucide="arrow-left"></i>
                    <span>Back to Writer</span>
                </a>
                <button id="themeToggle" class="btn-theme" title="Toggle Theme">
                    <i data-lucide="moon"></i>
                </button>
            </div>
            
            <div class="logo" style="justify-content: center; margin-bottom: 12px;">
                <i data-lucide="pen-tool"></i>
                <span>EssayAI</span>
            </div>
        </header>

        <main class="main-content">
            <!-- Standalone Donation Card -->
            <section class="card donate-card-full" id="donationMainCard" style="text-align: center; padding: 48px 32px;">
                <div class="donate-title-area">
                    <div class="donation-icon-wrapper" style="margin: 0 auto 20px;">
                        <i data-lucide="heart" class="heart-icon"></i>
                    </div>
                    <h1>Support EssayAI</h1>
                    <p style="margin-bottom: 24px;">This feature will be coming soon!</p>
                    
                    <a href="index.html" class="btn-primary" style="display: inline-flex; width: auto; padding: 12px 32px; margin: 0 auto; text-decoration: none;">
                        <span>Back to Writer</span>
                        <i data-lucide="arrow-right"></i>
                    </a>
                </div>
            </section>
        </main>
    </div>

    <!-- Page script -->
    <script src="donate.js"></script>
</body>
</html>
